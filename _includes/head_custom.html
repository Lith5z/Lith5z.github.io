<script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']], 
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true,
      packages: {'[+]': ['noerrors']}
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
      ignoreHtmlClass: 'tex2jax_ignore',
      processHtmlClass: 'tex2jax_process'
    },
    startup: {
      pageReady: () => {
        return MathJax.startup.defaultPageReady().then(() => {
          MathJax.typesetPromise();
        });
      }
    }
  }; // <--- 确保这里有分号和闭合
</script> <!-- <--- 确保这里有闭合标签 -->
